<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Для Сони ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Montserrat', sans-serif;
            user-select: none;
            -webkit-touch-callout: none;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* --- СТАРТОВЫЙ ЭКРАН --- */
        #intro {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000;
            z-index: 50;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: opacity 1s ease;
        }

        .pulse-text {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        /* --- ФОТОГРАФИИ --- */
        .memory-photo {
            position: absolute;
            top: 45%; 
            left: 50%;
            transform: translate(-50%, -50%) scale(0.95);
            max-width: 80vw;
            max-height: 45vh;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(255, 0, 50, 0.4);
            z-index: 5;
            opacity: 0;
            pointer-events: none;
            object-fit: cover;
            transition: opacity 2s ease, transform 4s ease;
        }

        .show-photo {
            opacity: 1 !important;
            transform: translate(-50%, -50%) scale(1.02) !important;
        }

        /* --- СУБТИТРЫ --- */
        #lyrics {
            position: absolute;
            bottom: 20%;
            width: 86%;
            padding: 0 7%; 
            text-align: center;
            color: #fff;
            font-size: clamp(16px, 5vw, 22px); 
            line-height: 1.4;
            font-weight: 700;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(255, 0, 50, 0.8), 0 0 20px rgba(255, 0, 50, 0.5);
            transition: opacity 0.3s ease, transform 0.3s ease;
            opacity: 0;
            transform: translateY(10px);
        }

        .show-lyric {
            opacity: 1 !important;
            transform: translateY(0) !important;
        }
    </style>
</head>
<body>

    <div id="intro">
        <div class="pulse-text">кис, включи звук и нажми) 💌</div>
    </div>

    <img id="photo1" class="memory-photo" src="1.png" alt="photo1">
    <img id="photo2" class="memory-photo" src="2.png" alt="photo2">
    <img id="photo3" class="memory-photo" src="3.png" alt="photo3">

    <div id="lyrics"></div>

    <audio id="bgMusic">
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <canvas id="heartCanvas"></canvas>

    <script>
        // --- 1. ТАЙМИНГИ И ТЕКСТ СУБТИТРОВ ---
        const lyricsData = [
            { time: 0.0, text: "" },
            { time: 5.0, text: "Снова мокро, но мне всё побоку" },
            { time: 8.0, text: "Я до тебя бегу, с тобою заебок мне" },
            { time: 11.0, text: "Может, бахнем? Погляди, как пахнет" },
            { time: 13.0, text: "Кроме тебя больше совсем таких девах нет" },
            { time: 16.0, text: "Узнаю силуэт в окне" },
            { time: 18.0, text: "Знаю, ты думаешь обо мне" },
            { time: 21.0, text: "От тебя забегали по спине" },
            { time: 24.0, text: "Без тебя вообще больше смысла нет" },
            { time: 27.0, text: "Только тобой я дышу в июльской жаре" },
            { time: 29.0, text: "С нами городской шум и блеск фонаря" },
            { time: 32.0, text: "Никуда не спешу, душу мне согрей" },
            { time: 34.0, text: "Ну-ка, ну-ка, подойди же ко мне скорей" },
            { time: 37.0, text: "Никого не вижу, кроме" },
            { time: 39.0, text: "Тону с тобой, если это не любовь, что тогда любовь?" },
            { time: 43.0, text: "И не то, что мне совсем без тебя слабо" },
            { time: 46.0, text: "Просто, попросту с тобою мне заебок" },
            { time: 49.0, text: "кис я правда тебя очень сильно люблю" },
            { time: 51.0, text: "я хочу чтобы ты всегда не сомневалась в моей любви к тебе" },
            { time: 54.0, text: "ты самый лучший человек в моей жизни кого я встречал" },
            { time: 57.0, text: "я очень сильно тебя люблю" },
            { time: 59.0, text: "ты самый прекрасный человек на этом свете" },
            { time: 61.0, text: "я хочу прожить с тобой всю жизнь." },
            { time: 63.0, text: "ты единственная кому я могу довериться, честно, я просто в ахуе что ты у меня есть" },
            { time: 66.0, text: "Соня, я люблю тебя ❤️" } 
        ];

        // --- 2. ЛОГИКА СУБТИТРОВ, МУЗЫКИ И ФОТО ---
        const bgMusic = document.getElementById('bgMusic');
        const introScreen = document.getElementById('intro');
        const lyricsElement = document.getElementById('lyrics');
        
        const photo1 = document.getElementById('photo1');
        const photo2 = document.getElementById('photo2');
        const photo3 = document.getElementById('photo3');
        
        let currentLyricIndex = -1;

        introScreen.addEventListener('click', () => {
            introScreen.style.opacity = '0'; 
            setTimeout(() => introScreen.style.display = 'none', 1000); 
            bgMusic.play(); 
        });

        bgMusic.addEventListener('timeupdate', () => {
            const currentTime = bgMusic.currentTime;
            
            // ФОТО 1
            if (currentTime >= 49.5 && currentTime < 58) {
                photo1.classList.add('show-photo');
            } else {
                photo1.classList.remove('show-photo');
            }
            // ФОТО 2
            if (currentTime >= 59.5 && currentTime < 66.5) {
                photo2.classList.add('show-photo');
            } else {
                photo2.classList.remove('show-photo');
            }
            // ФОТО 3
            if (currentTime >= 67.5 && currentTime < 85) {
                photo3.classList.add('show-photo');
            } else {
                photo3.classList.remove('show-photo');
            }

            // СУБТИТРЫ
            let activeIndex = -1;
            for (let i = 0; i < lyricsData.length; i++) {
                if (currentTime >= lyricsData[i].time) {
                    activeIndex = i;
                }
            }

            if (activeIndex !== currentLyricIndex && activeIndex !== -1) {
                currentLyricIndex = activeIndex;
                const text = lyricsData[activeIndex].text;
                
                if (text === "") {
                    lyricsElement.classList.remove('show-lyric');
                } else {
                    lyricsElement.innerText = text;
                    lyricsElement.classList.add('show-lyric');
                }
            }
        });

        // --- 3. ИСПРАВЛЕННАЯ ЛОГИКА СЕРДЦА ---
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let time = 0;
        const particles = [];
        const numParticles = 100;

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = canvas.width / 2 + (Math.random() - 0.5) * 100;
                this.y = canvas.height * 0.38 + (Math.random() - 0.5) * 100;
                this.vx = (Math.random() - 0.5) * 1;
                this.vy = -Math.random() * 2 - 1; 
                this.life = 1; 
                this.decay = Math.random() * 0.01 + 0.005; 
                this.size = Math.random() * 2 + 1; 
                this.color = `hsl(${Math.random() * 20 + 350}, 100%, ${Math.random() * 30 + 50}%)`;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
                if (this.life <= 0) this.reset();
            }
            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < numParticles; i++) particles.push(new Particle());

        function getHeartPoint(t) {
            let x = 16 * Math.pow(Math.sin(t), 3);
            let y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
            return { x, y };
        }
        
        function render() {
            // Чуть сильнее затемняем старые кадры (чтобы убрать кашу)
            ctx.fillStyle = "rgba(0, 0, 0, 0.4)";
            ctx.globalAlpha = 1;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach(p => { p.update(); p.draw(); });

            ctx.globalAlpha = 1; 
            
            // Динамический размер шрифта: на телефоне будет мелкий, на компе крупный
            let fontSize = Math.max(9, Math.floor(canvas.width / 45));
            ctx.font = `bold ${fontSize}px monospace`;
            ctx.textAlign = "center";
            
            let cx = canvas.width / 2;
            let cy = canvas.height * 0.38;
            
            // Базовый масштаб
            let baseScale = Math.min(canvas.width, canvas.height) / 45;

            // ОСТАВИЛИ ВСЕГО 2 СЛОЯ (вместо 6), чтобы сердце было "полым"
            for (let j = 0; j < 2; j++) { 
                let scale = baseScale - (j * 1.5) + Math.sin(time + j) * 1.5;
                
                // РАЗДВИНУЛИ СЛОВА (было += 0.15, стало += 0.35)
                for (let i = 0; i < Math.PI * 2; i += 0.35) {
                    let p = getHeartPoint(i);
                    ctx.fillStyle = `hsl(350, 100%, ${65 - j * 15}%)`; 
                    ctx.fillText("I love you, Соня", cx + p.x * scale, cy - p.y * scale);
                }
            }
            
            time += 0.05; 
            requestAnimationFrame(render);
        }

        render();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles.forEach(p => p.reset());
        });
    </script>
</body>
</html>
