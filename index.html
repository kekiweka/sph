<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Сони ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000; /* Черный фон */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <canvas id="heartCanvas"></canvas>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        
        // Настраиваем размер под экран
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let time = 0;
        const particles = [];
        const numParticles = 100; // Количество искорок

        // Класс для создания искорок
        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                // Появляются в области сердца
                this.x = canvas.width / 2 + (Math.random() - 0.5) * 100;
                this.y = canvas.height / 2 + (Math.random() - 0.5) * 100;
                // Вектор движения вверх и немного в стороны
                this.vx = (Math.random() - 0.5) * 1;
                this.vy = -Math.random() * 2 - 1; // Всегда вверх
                this.life = 1; // Жизнь (альфа-канал)
                this.decay = Math.random() * 0.01 + 0.005; // Скорость затухания
                this.size = Math.random() * 2 + 1; // Размер искорки
                // Цвет от ярко-красного до золотистого
                this.color = `hsl(${Math.random() * 20 + 350}, 100%, ${Math.random() * 30 + 50}%)`;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay; // Затухание

                if (this.life <= 0) {
                    this.reset();
                }
            }

            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Создаем массив частиц
        for (let i = 0; i < numParticles; i++) {
            particles.push(new Particle());
        }

        // Математическая формула идеального сердечка
        function getHeartPoint(t) {
            let x = 16 * Math.pow(Math.sin(t), 3);
            let y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
            return { x, y };
        }
        
        // Функция анимации
        function render() {
            // Эффект шлейфа (немного прозрачный черный фон поверх старых кадров)
            ctx.fillStyle = "rgba(0, 0, 0, 0.2)";
            ctx.globalAlpha = 1;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // --- РИСУЕМ МАГИЧЕСКИЕ ИСКОРКИ ---
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // --- РИСУЕМ СЕРДЦЕ ИЗ ТЕКСТА ---
            ctx.globalAlpha = 1; // Возвращаем прозрачность для сердца
            ctx.font = "bold 14px monospace";
            ctx.textAlign = "center";
            
            let cx = canvas.width / 2;
            let cy = canvas.height / 2;
            
            // Рисуем несколько слоев сердца для эффекта 3D
            for (let j = 0; j < 6; j++) { 
                // Пульсация и масштаб
                let scale = (Math.min(canvas.width, canvas.height) / 50) - (j * 1.5) + Math.sin(time + j) * 1.5;
                
                for (let i = 0; i < Math.PI * 2; i += 0.15) {
                    let p = getHeartPoint(i);
                    // Цвет текста (от ярко-красного к темно-бордовому в глубине)
                    ctx.fillStyle = `hsl(350, 100%, ${60 - j * 8}%)`; 
                    
                    // ТЕКСТ ДЛЯ СОНИ
                    ctx.fillText("I love you, Соня", cx + p.x * scale, cy - p.y * scale);
                }
            }
            
            time += 0.05; // Скорость пульсации
            requestAnimationFrame(render);
        }

        render();

        // Обновляем холст при изменении размера
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Обнуляем частицы, чтобы они не разлетелись при ресайзе
            particles.forEach(p => p.reset());
        });
    </script>
</body>
</html>
